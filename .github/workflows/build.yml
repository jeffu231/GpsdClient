name: dotnet package

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: write
    
    steps:
      - uses: actions/checkout@v6
        
      - name: Setup .NET Core SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
          source-url: https://nuget.pkg.github.com/jeffu231/index.json
        env:
          NUGET_AUTH_TOKEN: ${{secrets.GITHUB_TOKEN}}
          
      - name: Display dotnet version
        run: dotnet --version
        
      - name: Install Dependencies
        run: dotnet restore
        
      - name: Setup git
        run: |
          git config --local user.email "git@k9kld.org"
          git config --local user.name "git"

      - name: Install Versionize
        run: dotnet tool install --global Versionize

      - name: Versioning
        id: versionize
        run: versionize --aggregate-pre-releases --skip-dirty
        continue-on-error: true

      - name: Test if release required
        if: steps.versionize.outcome != 'success'
        run: echo "Skipping Release. No release required."

      - name: Push changes to GitHub
        if: steps.versionize.outcome == 'success'
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
          tags: true

      - name: Get current version
        if: steps.versionize.outcome == 'success'
        run: echo "VERSION=v$(versionize inspect)" >> $GITHUB_ENV

      - name: Get current changelog
        if: steps.versionize.outcome == 'success'
        run: echo "$(versionize changelog)"
        
      - name: Build
        run: dotnet build -c Release --no-restore
        
      - name: Create the package
        run: dotnet pack -c Release GpsdClient
        
      - name: Publish the package to GPR
        run: dotnet nuget push --api-key ${{ secrets.NUGET_API_KEY }} GpsdClient/bin/Release/*.nupkg